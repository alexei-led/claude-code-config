# Read-only-plus-shell envelope. Gemini frontmatter has no read-only sandbox
# primitive (unlike Codex `sandbox_mode`), so run_shell_command is granted and
# constrained to read-only by the body directive — Pi-parity, same tradeoff as
# pi/frontmatter.yaml. Mirrors the Pi read/grep/find/ls/bash set.
tools:
  - read_file
  - grep_search
  - glob
  - run_shell_command
max_turns: 12
