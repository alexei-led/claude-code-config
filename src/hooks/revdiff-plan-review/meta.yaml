name: revdiff-plan-review
event: exitplanmode
# Top-level timeout is required by the schema but unused: `targets: [pi]` filters
# out Claude/Codex/Gemini, so only the `pi.timeout` override is ever emitted.
# Kept as a sane non-interactive ceiling in case the targets filter is widened.
timeout: 300
status_message: Reviewing plan with revdiff
targets:
  - pi
pi:
  # Outer wait in plan-mode/index.ts is 30 minutes; per-entry timeout must fire
  # first so hook-runner returns a blocked deny instead of the outer wait timing
  # out silently. 1740s = 29 minutes leaves a 60s margin.
  timeout: 1740
