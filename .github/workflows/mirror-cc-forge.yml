name: Mirror to cc-forge
on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:
permissions:
  contents: read
jobs:
  mirror:
    name: Push source to private mirror
    if: github.repository == 'alexei-led/cc-thingz'
    runs-on: ubuntu-latest
    env:
      CC_FORGE_TOKEN: ${{ secrets.CC_FORGE_TOKEN }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Push to cc-forge/main
        run: |
          test -n "$CC_FORGE_TOKEN" || {
            echo "CC_FORGE_TOKEN secret is missing"
            exit 1
          }
          git remote add cc-forge "https://${GITHUB_ACTOR}:${CC_FORGE_TOKEN}@github.com/alexei-led/cc-forge.git"
          git fetch cc-forge main
          expected=$(git rev-parse FETCH_HEAD)
          git push \
            --force-with-lease=refs/heads/main:$expected \
            cc-forge \
            HEAD:refs/heads/main
