name: Release
on:
  push:
    tags:
      - v*.*.*
permissions:
  contents: write
jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v5
        with:
          enable-caching: true
          cache-dependency-glob: uv.lock
      - run: uv run python scripts/validate-config.py
      - run: uv run --extra test python -m pytest tests/ -v
  release:
    name: Create Release
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Generate release notes
        id: notes
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          PREV_TAG=$(git describe --tags --abbrev=0 "${TAG}^" 2>/dev/null || echo "")

          if [ -n "$PREV_TAG" ]; then
            RANGE="${PREV_TAG}..${TAG}"
          else
            RANGE="${TAG}"
          fi

          {
            echo "## What's Changed"
            echo ""

            # Features
            FEATS=$(git log "$RANGE" --pretty=format:"- %s" --no-merges | grep -E "^- feat" || true)
            if [ -n "$FEATS" ]; then
              echo "### New Features"
              echo "$FEATS"
              echo ""
            fi

            # Fixes
            FIXES=$(git log "$RANGE" --pretty=format:"- %s" --no-merges | grep -E "^- fix" || true)
            if [ -n "$FIXES" ]; then
              echo "### Bug Fixes"
              echo "$FIXES"
              echo ""
            fi

            # Docs
            DOCS=$(git log "$RANGE" --pretty=format:"- %s" --no-merges | grep -E "^- docs" || true)
            if [ -n "$DOCS" ]; then
              echo "### Documentation"
              echo "$DOCS"
              echo ""
            fi

            # Refactors
            REFACTORS=$(git log "$RANGE" --pretty=format:"- %s" --no-merges | grep -E "^- (refactor|chore|ci)" || true)
            if [ -n "$REFACTORS" ]; then
              echo "### Maintenance"
              echo "$REFACTORS"
              echo ""
            fi

            echo "## Plugins"
            echo ""
            echo "| Plugin | Description |"
            echo "| ------ | ----------- |"
          } > "$RUNNER_TEMP/release-notes.md"

          # Extract plugin table from marketplace.json
          python3 -c "
          import json
          data = json.load(open('.claude-plugin/marketplace.json'))
          for p in data['plugins']:
              print(f\"| **{p['name']}** | {p['description']} |\")
          " >> "$RUNNER_TEMP/release-notes.md"

          {
            echo ""
            echo "## Installation"
            echo ""
            echo '```bash'
            echo "/plugin marketplace add $GITHUB_REPOSITORY"
            echo '```'
          } >> "$RUNNER_TEMP/release-notes.md"
      - uses: softprops/action-gh-release@v2
        with:
          body_path: ${{ runner.temp }}/release-notes.md
          generate_release_notes: false
