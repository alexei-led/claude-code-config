name: CI
on:
  push:
    branches:
      - master
    tags-ignore:
      - v*
  pull_request:
  workflow_dispatch:
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    outputs:
      python: ${{ steps.filter.outputs.python }}
      shell: ${{ steps.filter.outputs.shell }}
      markdown: ${{ steps.filter.outputs.markdown }}
      config: ${{ steps.filter.outputs.config }}
      skill_evals: ${{ steps.filter.outputs.skill_evals }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            python:
              - '**/*.py'
              - 'pyproject.toml'
              - 'uv.lock'
            shell:
              - '**/*.sh'
              - '.shellcheckrc'
            markdown:
              - '**/*.md'
              - '.markdownlint.yaml'
            config:
              - '**/*.json'
              - '**/*.toml'
              - 'scripts/validate-config.py'
            skill_evals:
              - 'plugins/**/skills/**'
              - 'tests/skill-evals/**'
              - 'scripts/prepare-skill-evals.py'
              - 'scripts/summarize-skill-evals.py'
              - 'docs/skill-eval*.md'
              - 'Makefile'
              - '.node-version'
  python-lint:
    name: Python Lint
    needs: changes
    if: needs.changes.outputs.python == 'true' || github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/ruff-action@v3
        with:
          args: check --output-format=github
      - uses: astral-sh/ruff-action@v3
        with:
          args: format --check
  shell-lint:
    name: Shell Lint
    needs: changes
    if: needs.changes.outputs.shell == 'true' || github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: luizm/action-sh-checker@v0.10.0
        env:
          SHFMT_OPTS: -i 0
  markdown-lint:
    name: Markdown Lint
    needs: changes
    if: needs.changes.outputs.markdown == 'true' || github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: DavidAnson/markdownlint-cli2-action@v23
        with:
          globs: '**/*.md'
  validate:
    name: Config Validation
    needs: changes
    if: needs.changes.outputs.config == 'true' || needs.changes.outputs.python == 'true' || needs.changes.outputs.skill_evals == 'true' || github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
      - run: make validate check
  test:
    name: Tests
    needs: changes
    if: needs.changes.outputs.config == 'true' || needs.changes.outputs.python == 'true' || github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
      - run: make test
  skill-evals:
    name: Skill Evals
    needs: changes
    if: |
      (github.event_name == 'workflow_dispatch' || needs.changes.outputs.skill_evals == 'true') && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
    runs-on: ubuntu-latest
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      SKILL_EVAL_WORKSPACE: /tmp/skill-evals
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
      - uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
      - name: Run advisory skill evals
        run: |
          set +e
          make skill-evals \
            SKILL_EVAL_LOG_FORMAT=jsonl \
            SKILL_EVAL_CONCURRENCY=8 \
            SKILL_EVAL_STRICT=0 \
            SKILL_EVAL_REPORT="$SKILL_EVAL_WORKSPACE/summary.md"
          status=$?
          if [ -f "$SKILL_EVAL_WORKSPACE/summary.md" ]; then
            cat "$SKILL_EVAL_WORKSPACE/summary.md" >> "$GITHUB_STEP_SUMMARY"
          else
            {
              echo "# Skill eval report"
              echo ""
              echo "No summary was produced. Check the job logs."
            } >> "$GITHUB_STEP_SUMMARY"
          fi
          if [ "$status" -ne 0 ]; then
            echo "::warning::Skill evals failed in advisory mode. See the job summary and artifact."
          fi
          exit 0
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: skill-eval-report
          path: ${{ runner.temp }}/skill-evals
          if-no-files-found: ignore
  secrets:
    name: Secret Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  ci-success:
    name: CI Success
    needs:
      - python-lint
      - shell-lint
      - markdown-lint
      - validate
      - test
      - secrets
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check all jobs
        run: |
          results='${{ toJson(needs) }}'
          if echo "$results" | grep -qE '"result": "(failure|cancelled)"'; then
            echo "::error::One or more CI jobs failed or were cancelled"
            exit 1
          fi
          echo "All jobs passed or were skipped"
