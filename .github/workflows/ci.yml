name: CI
on:
  push:
    branches:
      - master
    tags-ignore:
      - v*
  pull_request:
jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    outputs:
      python: ${{ steps.filter.outputs.python }}
      shell: ${{ steps.filter.outputs.shell }}
      markdown: ${{ steps.filter.outputs.markdown }}
      config: ${{ steps.filter.outputs.config }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            python:
              - '**/*.py'
              - 'pyproject.toml'
              - 'uv.lock'
            shell:
              - '**/*.sh'
              - '.shellcheckrc'
            markdown:
              - '**/*.md'
              - '.markdownlint.yaml'
            config:
              - '**/*.json'
              - '**/*.toml'
              - 'scripts/validate-config.py'
  python-lint:
    name: Python Lint
    needs: changes
    if: needs.changes.outputs.python == 'true' || github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/ruff-action@v3
        with:
          args: check --output-format=github
      - uses: astral-sh/ruff-action@v3
        with:
          args: format --check
  shell-lint:
    name: Shell Lint
    needs: changes
    if: needs.changes.outputs.shell == 'true' || github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: luizm/action-sh-checker@v0.9.0
        env:
          SHFMT_OPTS: -i 0
  markdown-lint:
    name: Markdown Lint
    needs: changes
    if: needs.changes.outputs.markdown == 'true' || github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DavidAnson/markdownlint-cli2-action@v20
        with:
          globs: '**/*.md'
  validate:
    name: Config Validation
    needs: changes
    if: needs.changes.outputs.config == 'true' || needs.changes.outputs.python == 'true' || github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-caching: true
          cache-dependency-glob: uv.lock
      - run: make validate
  test:
    name: Tests
    needs: changes
    if: needs.changes.outputs.config == 'true' || needs.changes.outputs.python == 'true' || github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-caching: true
          cache-dependency-glob: uv.lock
      - run: make test
  secrets:
    name: Secret Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  ci-success:
    name: CI Success
    needs:
      - python-lint
      - shell-lint
      - markdown-lint
      - validate
      - test
      - secrets
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check all jobs
        run: |
          results='${{ toJson(needs) }}'
          if echo "$results" | grep -qE '"result": "(failure|cancelled)"'; then
            echo "::error::One or more CI jobs failed or were cancelled"
            exit 1
          fi
          echo "All jobs passed or were skipped"
